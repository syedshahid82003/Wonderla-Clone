<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Screen</title>
<style>
  * { box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: radial-gradient(circle at 50% 30%, #fef9f0 0%, #fdeee0 45%, #fbe2cf 100%);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  .loader-container {
    text-align: center;
    position: relative;
  }

  .percentage {
    font-size: 4.5rem;
    font-weight: 800;
    color: #2b2440;
    margin-bottom: 4px;
    letter-spacing: -2px;
    text-shadow: 0 4px 18px rgba(110, 90, 200, 0.18);
    font-variant-numeric: tabular-nums;
  }

  .message {
    font-size: 1.15rem;
    font-weight: 600;
    color: #6a5acd;
    margin-bottom: 6px;
    transition: opacity 0.3s ease;
  }

  .subtext {
    font-size: 0.9rem;
    font-weight: 400;
    color: #9a8fc2;
    margin-bottom: 28px;
  }

  .wheel-wrap {
    position: relative;
    width: 260px;
    height: 260px;
    margin: 0 auto;
  }

  .sky-glow {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 200, 130, 0.35) 0%, rgba(255, 200, 130, 0) 70%);
    filter: blur(4px);
  }

  .ferris-wheel-group {
    transform-origin: 150px 150px;
    animation: spin 9s linear infinite;
  }

  .cabin-group {
    transform-origin: 150px 150px;
    animation: counterspin 9s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes counterspin {
    from { transform: rotate(0deg); }
    to { transform: rotate(-360deg); }
  }

  .hub {
    animation: pulseHub 2s ease-in-out infinite;
  }

  @keyframes pulseHub {
    0%, 100% { r: 9; }
    50% { r: 11; }
  }

  .base-shadow {
    fill: rgba(80, 60, 30, 0.12);
  }

  .progress-track {
    width: 240px;
    height: 6px;
    background: #f0e4d8;
    border-radius: 999px;
    margin: 0 auto;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.06);
  }

  .progress-fill {
    height: 100%;
    width: 66%;
    border-radius: 999px;
    background: linear-gradient(90deg, #ff8a5b, #ff6b9d 50%, #8a7bff);
    background-size: 200% 100%;
    animation: shimmer 2.4s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }
</style>
</head>
<body>

  <div class="loader-container">
    <div class="percentage" id="pct">66%</div>
    <div class="message" id="msg">Strapping you in...</div>
    <div class="subtext">get ready for the ride!</div>

    <div class="wheel-wrap">
      <div class="sky-glow"></div>
      <svg width="260" height="260" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <ellipse class="base-shadow" cx="150" cy="280" rx="90" ry="10"/>

        <g class="ferris-wheel-group">
          <circle cx="150" cy="150" r="120" stroke="#caa8ff" stroke-width="3" fill="none" opacity="0.55"/>
          <g stroke="#caa8ff" stroke-width="1.5" opacity="0.55">
            <line x1="150" y1="150" x2="150" y2="30" />
            <line x1="150" y1="150" x2="210" y2="46.1" />
            <line x1="150" y1="150" x2="253.9" y2="90" />
            <line x1="150" y1="150" x2="270" y2="150" />
            <line x1="150" y1="150" x2="253.9" y2="210" />
            <line x1="150" y1="150" x2="210" y2="253.9" />
            <line x1="150" y1="150" x2="150" y2="270" />
            <line x1="150" y1="150" x2="90" y2="253.9" />
            <line x1="150" y1="150" x2="46.1" y2="210" />
            <line x1="150" y1="150" x2="30" y2="150" />
            <line x1="150" y1="150" x2="46.1" y2="90" />
            <line x1="150" y1="150" x2="90" y2="46.1" />
          </g>
          <circle class="hub" cx="150" cy="150" r="9" fill="#ff8a5b"/>
        </g>

        <g class="cabin-group">
          <ellipse cx="150" cy="30" rx="16" ry="11" fill="#ff8a5b"/>
          <ellipse cx="210" cy="46.1" rx="16" ry="11" fill="#ff6b9d"/>
          <ellipse cx="253.9" cy="90" rx="16" ry="11" fill="#8a7bff"/>
          <ellipse cx="270" cy="150" rx="16" ry="11" fill="#5dcaa5"/>
          <ellipse cx="253.9" cy="210" rx="16" ry="11" fill="#ff8a5b"/>
          <ellipse cx="210" cy="253.9" rx="16" ry="11" fill="#ff6b9d"/>
          <ellipse cx="150" cy="270" rx="16" ry="11" fill="#8a7bff"/>
          <ellipse cx="90" cy="253.9" rx="16" ry="11" fill="#5dcaa5"/>
          <ellipse cx="46.1" cy="210" rx="16" ry="11" fill="#ff8a5b"/>
          <ellipse cx="30" cy="150" rx="16" ry="11" fill="#ff6b9d"/>
          <ellipse cx="46.1" cy="90" rx="16" ry="11" fill="#8a7bff"/>
          <ellipse cx="90" cy="46.1" rx="16" ry="11" fill="#5dcaa5"/>
        </g>
      </svg>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <script>
    var pctEl = document.getElementById('pct');
    var msgEl = document.getElementById('msg');
    var fillEl = document.getElementById('progressFill');

    var messages = [
      [0, 'Opening the gates...'],
      [25, 'Buying your tickets...'],
      [50, 'Strapping you in...'],
      [75, 'Climbing to the top...'],
      [95, 'Almost there...'],
      [100, 'Enjoy the ride!']
    ];

    var duration = 4000;
    var startTime = null;

    function ease(t) { 
        return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2
         }

    function frame(ts) {
      if (!startTime) startTime = ts;
      var elapsed = ts - startTime;
      var t = Math.min(elapsed / duration, 1);
      var pct = Math.round(ease(t) * 100);

      pctEl.textContent = pct + '%';
      fillEl.style.width = pct + '%';

      var current = messages[0][1];
      for (var i = 0; i < messages.length; i++) {
        if (pct >= messages[i][0]) current = messages[i][1];
      }
      msgEl.textContent = current;

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        setTimeout(function () {
          window.location.href = "index6.html"; 
        }, 400);
      }
    }
    requestAnimationFrame(frame);
  </script>

</body>
</html>
